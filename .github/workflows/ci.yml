name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          # REVIEW: 缺少 `pip install -e .`。
          # 项目用的是 src layout，pytest 靠 pyproject.toml 的 pythonpath = ["src"] 来找包。
          # 但如果某些 test 依赖 package metadata (比如 importlib.metadata)，
          # 没有 pip install -e . 就会失败。加上更稳妥。

      - name: Run tests
        run: python -m pytest
